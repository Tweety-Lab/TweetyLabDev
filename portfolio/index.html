<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="portfolio-style.css">
        <link rel="stylesheet" href="../style.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="navbar"></div>
        <div class="container">

            <h1>Portfolio</h1>
            <p>I do a lot of things, here's a collection of them!</p>

            <!-- This is programmatically filled -->
            <div id="project-list"></div>
        </div>

        <script type="module" src="../navbar.js"></script>
        <script type="module">
        import { projects } from "../portfolio-metadata.js";

        const list = document.getElementById("project-list");

        for (const project of projects) {
    list.insertAdjacentHTML("beforeend", `
        <article class="project-entry">
            <div class="project-header">
                <h2 class="terminal-header" id="${project.id}">
                    ${project.title}
                </h2>

                <a class="github-link"
                   href="${project.github}"
                   target="_blank"
                   rel="noopener noreferrer"
                   aria-label="View on GitHub">
                    <svg viewBox="0 0 16 16" aria-hidden="true">
                        <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8a8.01 8.01 0 005.47 7.59c.4.07.55-.17.55-.38v-1.33c-2.23.49-2.69-.95-2.69-.95-.36-.92-.89-1.16-.89-1.16-.73-.5.05-.49.05-.49.81.06 1.23.83 1.23.83.72 1.23 1.88.88 2.34.67.07-.52.28-.88.5-1.08-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.58.82-2.13-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 014 0c1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.55.82 1.26.82 2.13 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48v2.2c0 .21.14.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                </a>
            </div>

            <p>${project.body}</p>
        </article>
            `);
        }

        const title = document.querySelector("h1");

        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("visible");
                }
            });
        }, { threshold: 0.6 });

        observer.observe(title);
        </script>
    </body>
</html>

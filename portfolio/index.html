<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="portfolio-style.css">
        <link rel="stylesheet" href="../style.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="navbar"></div>
        <div class="container">

            <h1>Portfolio</h1>
            <p>I do a lot of things, here's a collection of them!</p>

            <!-- This is programmatically filled -->
            <div id="project-list"></div>
        </div>

        <script type="module" src="../navbar.js"></script>
        <script type="module">
        import { projects } from "../portfolio-metadata.js";

        const list = document.getElementById("project-list");

        const githubIcon = `
<svg viewBox="0 0 16 16" aria-hidden="true">
    <path fill="currentColor"
        d="M8 0C3.58 0 0 3.58 0 8a8.01 8.01 0 005.47 7.59c.4.07.55-.17.55-.38v-1.33c-2.23.49-2.69-.95-2.69-.95-.36-.92-.89-1.16-.89-1.16-.73-.5.05-.49.05-.49.81.06 1.23.83 1.23.83.72 1.23 1.88.88 2.34.67.07-.52.28-.88.5-1.08-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.58.82-2.13-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 014 0c1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.55.82 1.26.82 2.13 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48v2.2c0 .21.14.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
</svg>
`;

const steamIcon = `
<svg viewBox="0 0 24 24" aria-hidden="true">
    <path fill="currentColor"
        d="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22C7.4,22 3.55,18.92 2.36,14.73L6.19,16.31C6.45,17.6 7.6,18.58 8.97,18.58C10.53,18.58 11.8,17.31 11.8,15.75V15.62L15.2,13.19H15.28C17.36,13.19 19.05,11.5 19.05,9.42C19.05,7.34 17.36,5.65 15.28,5.65C13.2,5.65 11.5,7.34 11.5,9.42V9.47L9.13,12.93L8.97,12.92C8.38,12.92 7.83,13.1 7.38,13.41L2,11.2C2.43,6.05 6.73,2 12,2M8.28,17.17C9.08,17.5 10,17.13 10.33,16.33C10.66,15.53 10.28,14.62 9.5,14.29L8.22,13.76C8.71,13.58 9.26,13.57 9.78,13.79C10.31,14 10.72,14.41 10.93,14.94C11.15,15.46 11.15,16.04 10.93,16.56C10.5,17.64 9.23,18.16 8.15,17.71C7.65,17.5 7.27,17.12 7.06,16.67L8.28,17.17M17.8,9.42C17.8,10.81 16.67,11.94 15.28,11.94C13.9,11.94 12.77,10.81 12.77,9.42A2.5,2.5 0 0,1 15.28,6.91C16.67,6.91 17.8,8.04 17.8,9.42M13.4,9.42C13.4,10.46 14.24,11.31 15.29,11.31C16.33,11.31 17.17,10.46 17.17,9.42C17.17,8.38 16.33,7.53 15.29,7.53C14.24,7.53 13.4,8.38 13.4,9.42Z"/>
</svg>
`;

        for (const project of projects) {
            list.insertAdjacentHTML("beforeend", `
                <article class="project-entry">
                    <div class="project-header">
                        <h2 class="terminal-header" id="${project.id}">
                            ${project.title}
                        </h2>

                        <div class="project-links">
                            ${
                                project.github
                                    ? `<a class="icon-link"
                                        href="${project.github}"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        aria-label="GitHub repository">
                                        ${githubIcon}
                                    </a>`
                                    : ""
                            }

                            ${
                                project.steam
                                    ? `<a class="icon-link"
                                        href="${project.steam}"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        aria-label="Steam page">
                                        ${steamIcon}
                                    </a>`
                                    : ""
                            }
                        </div>
                    </div>

                    <p>${project.body}</p>
                </article>
            `);
        }

        const title = document.querySelector("h1");

        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("visible");
                }
            });
        }, { threshold: 0.6 });

        observer.observe(title);
        </script>
    </body>
</html>
